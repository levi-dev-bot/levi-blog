name: Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        run: |
          npm install
          npm install hexo-theme-butterfly
      - name: Link Theme
        run: |
          ln -sf node_modules/hexo-theme-butterfly themes/butterfly
      - name: Update Config
        run: |
          sed -i 's|^title:.*|title: Levi'"'"'s Blog|' _config.yml
          sed -i 's|^author:.*|author: Levi|' _config.yml
          sed -i 's|^language:.*|language: zh-CN|' _config.yml
          sed -i 's|url:.*|url: https://live-tech.top|' _config.yml
          # Add root only if not already present
          grep -q '^root:' _config.yml || sed -i '/^url:/a root: /' _config.yml
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
